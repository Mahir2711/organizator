<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organizator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --paper:#F4EEDF;
    --paper-dark:#E9E0C9;
    --ink:#2B2A24;
    --ink-soft:#6B6555;
    --line:#D8CEB2;
    --tape:#F1E7B8;
    --warn:#B4472A;
    --warn-soft:#F4DCD3;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(43,42,36,0.05) 1px, transparent 0);
    background-size: 22px 22px;
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding: 28px 18px 80px;
  }

  .wrap{max-width:980px;margin:0 auto;}

  header.top{
    display:flex;
    flex-wrap:wrap;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px;
    margin-bottom:26px;
    border-bottom:2px solid var(--line);
    padding-bottom:18px;
  }
  h1{
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:2.1rem;
    margin:0;
    letter-spacing:-0.5px;
  }
  h1 span.dot{color:#3D6B75;}
  .subtitle{
    font-size:0.85rem;
    color:var(--ink-soft);
    margin-top:4px;
  }

  .search-box{
    position:relative;
    flex:1;
    min-width:220px;
    max-width:320px;
  }
  .search-box input{
    width:100%;
    padding:10px 14px;
    border-radius:10px;
    border:2px solid var(--line);
    background:#fff;
    font-family:'Inter',sans-serif;
    font-size:0.9rem;
    color:var(--ink);
  }
  .search-box input:focus{
    outline:none;
    border-color:#3D6B75;
  }

  .status-msg{
    text-align:center;
    color:var(--ink-soft);
    font-size:0.9rem;
    padding:40px 0;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(280px,1fr));
    gap:22px;
  }

  .shelf{
    position:relative;
    background:#fffdf7;
    border-radius:14px;
    border:1px solid var(--line);
    box-shadow:0 3px 0 rgba(43,42,36,0.06);
    padding:22px 18px 16px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .tape{
    position:absolute;
    top:-11px;
    left:24px;
    width:78px;
    height:22px;
    background:var(--tape);
    opacity:0.9;
    transform:rotate(-3deg);
    box-shadow:0 1px 2px rgba(0,0,0,0.12);
    border-radius:2px;
  }

  .shelf-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }
  .shelf-title{
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:1.15rem;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .swatch{
    width:11px;height:11px;border-radius:50%;
    flex-shrink:0;
  }
  .shelf-actions{display:flex; gap:6px;}
  .icon-btn{
    background:none;border:none;cursor:pointer;
    color:var(--ink-soft);
    font-size:1rem;
    padding:4px 6px;
    border-radius:6px;
    line-height:1;
  }
  .icon-btn:hover{background:var(--paper-dark); color:var(--ink);}
  .lock-note{
    font-size:0.72rem;
    color:var(--ink-soft);
    opacity:0.6;
  }

  .items{
    display:flex;
    flex-direction:column;
    gap:7px;
    min-height:6px;
  }
  .empty-note{
    font-size:0.83rem;
    color:var(--ink-soft);
    font-style:italic;
    padding:6px 2px;
  }

  .item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:9px;
    padding:8px 10px;
    font-size:0.9rem;
  }
  .item.warn{
    background:var(--warn-soft);
    border-color:#e0b3a2;
  }
  .item.bought{
    opacity:0.55;
  }
  .item-check{
    flex-shrink:0;
    width:17px;
    height:17px;
    cursor:pointer;
    accent-color:#3D6B75;
  }
  .item-main{
    display:flex;
    flex-direction:column;
    gap:3px;
    min-width:0;
    flex:1;
  }
  .item-name{
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .item-name.crossed{
    text-decoration:line-through;
    color:var(--ink-soft);
  }
  .item-meta{
    font-size:0.75rem;
    color:var(--ink-soft);
    display:flex;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;
  }
  .item-meta .exp-warn{color:var(--warn); font-weight:600;}
  .qty-input{
    width:48px;
    font-family:'Inter',sans-serif;
    border:1px solid var(--line);
    border-radius:6px;
    padding:2px 4px;
    font-size:0.75rem;
    background:#fff;
    color:var(--ink);
  }
  .qty-input:focus{ outline:none; border-color:#3D6B75; }
  .item-del{
    background:none;
    border:none;
    color:var(--ink-soft);
    cursor:pointer;
    font-size:1rem;
    padding:2px 6px;
    flex-shrink:0;
  }
  .item-del:hover{color:var(--warn);}

  form.add-item{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:4px;
    border-top:1px dashed var(--line);
    padding-top:12px;
  }
  form.add-item input, form.add-item select{
    font-family:'Inter',sans-serif;
    border:1.5px solid var(--line);
    border-radius:7px;
    padding:6px 8px;
    font-size:0.83rem;
    background:#fff;
    color:var(--ink);
  }
  form.add-item input:focus, form.add-item select:focus{
    outline:none;
    border-color:var(--ink-soft);
  }
  .f-name{flex:2; min-width:110px;}
  .f-qty{width:56px;}
  .f-unit{width:64px;}
  .f-exp{flex:1; min-width:110px;}
  .f-submit{
    border:none;
    border-radius:7px;
    padding:6px 12px;
    font-size:0.83rem;
    font-weight:600;
    cursor:pointer;
    color:#fff;
    font-family:'Inter',sans-serif;
  }

  .add-shelf{
    border:2px dashed var(--line);
    border-radius:14px;
    background:transparent;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:120px;
    cursor:pointer;
    color:var(--ink-soft);
    font-family:'Fredoka',sans-serif;
    font-size:1rem;
    font-weight:600;
    gap:8px;
    transition:background 0.15s, color 0.15s;
  }
  .add-shelf:hover{background:var(--paper-dark); color:var(--ink);}

  .new-shelf-form{
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:8px;
  }
  .new-shelf-form input{
    padding:7px 9px;
    border-radius:7px;
    border:1.5px solid var(--line);
    font-family:'Inter',sans-serif;
  }
  .type-row{
    display:flex;
    gap:14px;
    font-size:0.85rem;
  }
  .type-row label{ display:flex; align-items:center; gap:5px; cursor:pointer; }
  .color-row{display:flex; gap:6px; flex-wrap:wrap;}
  .color-row button{
    width:24px;height:24px;
    border-radius:50%;
    border:2px solid transparent;
    cursor:pointer;
  }
  .color-row button.sel{border-color:var(--ink);}
  .new-shelf-buttons{display:flex; gap:8px; margin-top:2px;}
  .new-shelf-buttons button{
    border:none;
    border-radius:7px;
    padding:7px 12px;
    font-size:0.83rem;
    font-weight:600;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .btn-save{background:#3D6B75; color:#fff;}
  .btn-cancel{background:var(--paper-dark); color:var(--ink);}

  footer.note{
    text-align:center;
    color:var(--ink-soft);
    font-size:0.78rem;
    margin-top:40px;
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>Organiza<span class="dot">tor</span></h1>
      <div class="subtitle">Šta imamo, gdje je, i šta treba kupiti</div>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Pretraži namirnice...">
    </div>
  </header>

  <div id="statusMsg" class="status-msg">Učitavanje...</div>
  <div id="grid" class="grid" style="display:none;"></div>
</div>

<footer class="note">Podaci se čuvaju automatski u tvom nalogu.</footer>

<script>
const COLORS = {
  gore:   {main:'#3D6B75', soft:'#DCE9EA'},
  dolje:  {main:'#4C6B4F', soft:'#E1E9DD'},
  zacini: {main:'#B9852F', soft:'#F1E3C4'},
  extra:  {main:'#7A5C7E', soft:'#EBE1EC'},
  rose:   {main:'#A85C6B', soft:'#F0DEE1'},
  slate:  {main:'#5C6B7A', soft:'#DFE3E9'},
};
const COLOR_KEYS = Object.keys(COLORS);

// ====== FIREBASE PODEŠAVANJE ======
// Zamijeni ove vrijednosti sa svojim iz Firebase konzole
// (Project settings -> General -> Your apps -> SDK setup and configuration)
const firebaseConfig = {
  apiKey: "AIzaSyAyh8myg0kNk7bu6GnqPzzgH2nmJIwu_8k",
  authDomain: "nas-organizator.firebaseapp.com",
  projectId: "nas-organizator",
  storageBucket: "nas-organizator.firebasestorage.app",
  messagingSenderId: "695248272725",
  appId: "1:695248272725:web:9ba3306eb6c0159167c3dc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection('organizator').doc('kuca');
let ignoreNextSnapshot = false;
// ====================================

let state = null;

const DEFAULT_STATE = {
  categories: [
    { id: 'gore', name: 'Frižider gore', colorKey: 'gore', type: 'stock', locked: true, items: [] },
    { id: 'dolje', name: 'Frižider dolje', colorKey: 'dolje', type: 'stock', locked: true, items: [] },
    { id: 'zacini', name: 'Ladica sa začinima', colorKey: 'zacini', type: 'stock', locked: true, items: [] },
    { id: 'kupovina', name: 'Spisak za kupovinu', colorKey: 'extra', type: 'shopping', locked: true, items: [] },
  ]
};

function uid(){ return Math.random().toString(36).slice(2,9); }

function normalizeState(s){
  s.categories.forEach(c => {
    if(!c.type) c.type = 'stock';
    if(c.locked === undefined) c.locked = false;
    c.items.forEach(it => { if(it.bought === undefined) it.bought = false; });
  });
  return s;
}

async function loadState(){
  try{
    const snap = await docRef.get();
    if(snap.exists && snap.data().payload){
      state = normalizeState(JSON.parse(snap.data().payload));
    } else {
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
      await saveState();
    }
  } catch(e){
    console.error('Greška pri učitavanju iz Firebase-a:', e);
    state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  }

  // Slušaj promjene uživo - kad neko drugi doda/promijeni nešto na drugom uređaju,
  // ova stranica će se automatski osvježiti.
  docRef.onSnapshot(snap => {
    if(ignoreNextSnapshot){ ignoreNextSnapshot = false; return; }
    if(snap.exists && snap.data().payload){
      state = normalizeState(JSON.parse(snap.data().payload));
      render();
    }
  });
}

async function saveState(){
  try{
    ignoreNextSnapshot = true;
    await docRef.set({ payload: JSON.stringify(state) });
  } catch(e){
    console.error('Greška pri čuvanju u Firebase:', e);
    alert('Nije uspjelo čuvanje - provjeri internet konekciju.');
  }
}

function daysUntil(dateStr){
  if(!dateStr) return null;
  const today = new Date();
  today.setHours(0,0,0,0);
  const d = new Date(dateStr);
  d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function formatDate(dateStr){
  const d = new Date(dateStr);
  return d.toLocaleDateString('hr-HR', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

let addingShelf = false;
let newShelfColor = COLOR_KEYS[0];
let newShelfType = 'stock';

function render(){
  const grid = document.getElementById('grid');
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  grid.innerHTML = '';

  state.categories.forEach(cat => {
    const color = COLORS[cat.colorKey] || COLORS.gore;
    const card = document.createElement('div');
    card.className = 'shelf';

    const filteredItems = search
      ? cat.items.filter(it => it.name.toLowerCase().includes(search))
      : cat.items;

    const deleteBtn = cat.locked
      ? ''
      : `<button class="icon-btn" data-action="del-cat" data-cat="${cat.id}" title="Obriši kategoriju">✕</button>`;

    const itemsHtml = filteredItems.length === 0
      ? `<div class="empty-note">${search ? 'Nema rezultata.' : (cat.type === 'shopping' ? 'Spisak je prazan.' : 'Prazno. Dodaj nešto ispod.')}</div>`
      : filteredItems.map(it => cat.type === 'shopping' ? renderShoppingItem(it, cat.id) : renderStockItem(it, cat.id)).join('');

    const formHtml = cat.type === 'shopping'
      ? `
      <form class="add-item" data-cat="${cat.id}">
        <input class="f-name" type="text" placeholder="Šta treba kupiti" required>
        <input class="f-qty" type="number" min="0" step="0.1" placeholder="Kol." value="1">
        <select class="f-unit">
          <option value="kom">kom</option>
          <option value="g">g</option>
          <option value="kg">kg</option>
          <option value="ml">ml</option>
          <option value="l">l</option>
          <option value="pak">pak</option>
        </select>
        <input class="f-exp" type="date" title="Datum (opciono)">
        <button class="f-submit" type="submit" style="background:${color.main}">Dodaj</button>
      </form>`
      : `
      <form class="add-item" data-cat="${cat.id}">
        <input class="f-name" type="text" placeholder="Namirnica" required>
        <input class="f-qty" type="number" min="0" step="0.1" placeholder="Kol." value="1">
        <select class="f-unit">
          <option value="kom">kom</option>
          <option value="g">g</option>
          <option value="kg">kg</option>
          <option value="ml">ml</option>
          <option value="l">l</option>
          <option value="pak">pak</option>
        </select>
        <input class="f-exp" type="date" title="Rok trajanja (opciono)">
        <button class="f-submit" type="submit" style="background:${color.main}">Dodaj</button>
      </form>`;

    card.innerHTML = `
      <div class="tape"></div>
      <div class="shelf-head">
        <div class="shelf-title"><span class="swatch" style="background:${color.main}"></span>${escapeHtml(cat.name)}</div>
        <div class="shelf-actions">${deleteBtn}</div>
      </div>
      <div class="items">${itemsHtml}</div>
      ${formHtml}
    `;
    grid.appendChild(card);
  });

  // Add-category tile
  const addTile = document.createElement('div');
  if(!addingShelf){
    addTile.className = 'add-shelf';
    addTile.innerHTML = `<span style="font-size:1.3rem;">+</span> Nova kategorija`;
    addTile.addEventListener('click', () => { addingShelf = true; newShelfColor = COLOR_KEYS[0]; newShelfType = 'stock'; render(); });
  } else {
    addTile.className = 'shelf';
    addTile.innerHTML = `
      <div class="tape"></div>
      <div class="new-shelf-form">
        <input type="text" id="newShelfName" placeholder="Naziv kategorije (npr. Ostava)">
        <div class="type-row">
          <label><input type="radio" name="newType" value="stock" checked> Zaliha (sa rokom trajanja)</label>
          <label><input type="radio" name="newType" value="shopping"> Spisak za kupovinu</label>
        </div>
        <div class="color-row" id="colorRow"></div>
        <div class="new-shelf-buttons">
          <button class="btn-save" id="saveShelfBtn">Sačuvaj</button>
          <button class="btn-cancel" id="cancelShelfBtn">Otkaži</button>
        </div>
      </div>
    `;
  }
  grid.appendChild(addTile);

  if(addingShelf){
    const colorRow = document.getElementById('colorRow');
    COLOR_KEYS.forEach(k => {
      const b = document.createElement('button');
      b.style.background = COLORS[k].main;
      if(k === newShelfColor) b.classList.add('sel');
      b.addEventListener('click', (e) => {
        e.preventDefault();
        newShelfColor = k;
        render();
        document.getElementById('newShelfName').focus();
      });
      colorRow.appendChild(b);
    });
    document.querySelectorAll('input[name="newType"]').forEach(r => {
      r.checked = (r.value === newShelfType);
      r.addEventListener('change', () => { newShelfType = r.value; });
    });
    document.getElementById('saveShelfBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      const name = document.getElementById('newShelfName').value.trim();
      if(!name) return;
      state.categories.push({ id: uid(), name, colorKey: newShelfColor, type: newShelfType, locked: false, items: [] });
      addingShelf = false;
      await saveState();
      render();
    });
    document.getElementById('cancelShelfBtn').addEventListener('click', (e) => {
      e.preventDefault();
      addingShelf = false;
      render();
    });
  }

  attachItemFormHandlers();
  attachDeleteHandlers();
  attachQtyHandlers();
  attachCheckHandlers();
}

function renderStockItem(it, catId){
  const d = daysUntil(it.expiry);
  let warnClass = '';
  let expLabel = '';
  if(d !== null){
    if(d < 0){ warnClass = 'warn'; expLabel = `<span class="exp-warn">isteklo prije ${Math.abs(d)}d</span>`; }
    else if(d === 0){ warnClass = 'warn'; expLabel = `<span class="exp-warn">ističe danas</span>`; }
    else if(d <= 3){ warnClass = 'warn'; expLabel = `<span class="exp-warn">ističe za ${d}d</span>`; }
    else { expLabel = `do ${formatDate(it.expiry)}`; }
  }
  return `
    <div class="item ${warnClass}">
      <div class="item-main">
        <div class="item-name">${escapeHtml(it.name)}</div>
        <div class="item-meta">
          <input class="qty-input" type="number" min="0" step="0.1" value="${it.qty}" data-action="edit-qty" data-cat="${catId}" data-item="${it.id}">
          <span>${escapeHtml(it.unit)}</span>
          ${expLabel ? `<span>· ${expLabel}</span>` : ''}
        </div>
      </div>
      <button class="item-del" data-action="del-item" data-cat="${catId}" data-item="${it.id}" title="Ukloni">✕</button>
    </div>
  `;
}

function renderShoppingItem(it, catId){
  const dateLabel = it.expiry ? `· ${formatDate(it.expiry)}` : '';
  return `
    <div class="item ${it.bought ? 'bought' : ''}">
      <input class="item-check" type="checkbox" ${it.bought ? 'checked' : ''} data-action="toggle-bought" data-cat="${catId}" data-item="${it.id}">
      <div class="item-main">
        <div class="item-name ${it.bought ? 'crossed' : ''}">${escapeHtml(it.name)}</div>
        <div class="item-meta">
          <input class="qty-input" type="number" min="0" step="0.1" value="${it.qty}" data-action="edit-qty" data-cat="${catId}" data-item="${it.id}">
          <span>${escapeHtml(it.unit)}</span>
          <span>${dateLabel}</span>
        </div>
      </div>
      <button class="item-del" data-action="del-item" data-cat="${catId}" data-item="${it.id}" title="Ukloni">✕</button>
    </div>
  `;
}

function attachItemFormHandlers(){
  document.querySelectorAll('form.add-item').forEach(form => {
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const catId = form.dataset.cat;
      const name = form.querySelector('.f-name').value.trim();
      const qty = form.querySelector('.f-qty').value || '1';
      const unit = form.querySelector('.f-unit').value;
      const exp = form.querySelector('.f-exp').value;
      if(!name) return;
      const cat = state.categories.find(c => c.id === catId);
      if(!cat) return;
      cat.items.push({ id: uid(), name, qty, unit, expiry: exp || null, bought: false });
      await saveState();
      render();
    });
  });
}

function attachDeleteHandlers(){
  document.querySelectorAll('[data-action="del-item"]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const cat = state.categories.find(c => c.id === btn.dataset.cat);
      if(!cat) return;
      cat.items = cat.items.filter(it => it.id !== btn.dataset.item);
      await saveState();
      render();
    });
  });
  document.querySelectorAll('[data-action="del-cat"]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const cat = state.categories.find(c => c.id === btn.dataset.cat);
      if(!cat || cat.locked) return;
      if(!confirm(`Obrisati kategoriju "${cat.name}" i sve namirnice u njoj?`)) return;
      state.categories = state.categories.filter(c => c.id !== btn.dataset.cat);
      await saveState();
      render();
    });
  });
}

function attachQtyHandlers(){
  document.querySelectorAll('[data-action="edit-qty"]').forEach(input => {
    input.addEventListener('change', async () => {
      const cat = state.categories.find(c => c.id === input.dataset.cat);
      if(!cat) return;
      const item = cat.items.find(it => it.id === input.dataset.item);
      if(!item) return;
      const val = parseFloat(input.value);
      item.qty = isNaN(val) ? 0 : val;
      await saveState();
      render();
    });
  });
}

function attachCheckHandlers(){
  document.querySelectorAll('[data-action="toggle-bought"]').forEach(box => {
    box.addEventListener('change', async () => {
      const cat = state.categories.find(c => c.id === box.dataset.cat);
      if(!cat) return;
      const item = cat.items.find(it => it.id === box.dataset.item);
      if(!item) return;
      item.bought = box.checked;
      await saveState();
      render();
    });
  });
}

document.getElementById('searchInput').addEventListener('input', render);

(async function init(){
  await loadState();
  document.getElementById('statusMsg').style.display = 'none';
  document.getElementById('grid').style.display = 'grid';
  render();
})();
</script>
</body>
</html>
